name: pp_mobile
description: PantryPal V3 — Cross-platform mobile application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Networking
  dio: ^5.4.0

  # Auth
  amplify_flutter: ^2.0.0
  amplify_auth_cognito: ^2.0.0

  # Camera & Image
  camera: ^0.11.0
  image_picker: ^1.0.0
  cached_network_image: ^3.3.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Utils
  intl: ^0.19.0
  equatable: ^2.0.0
  json_annotation: ^4.8.0
  shimmer: ^3.0.0
  flutter_svg: ^2.0.0
  google_fonts: ^6.2.1
  video_player: ^2.8.0
  lucide_icons: ^0.257.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/fonts/
